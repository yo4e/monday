<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monday GitHub Sandbox</title>
    <meta
      name="description"
      content="月野テンプレクス（Monday）のGitHub作業用サンドボックスサイトです。"
    />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="site-title">
        <p class="eyebrow">GitHub workbench / sample site</p>
        <h1 id="site-title">Monday GitHub Sandbox</h1>
        <p class="lead">
          ここは、月野テンプレクスがGitHub連携で作業できる範囲を試すための
          小さな実験場です。
        </p>
        <div class="actions" aria-label="このサイトで試していること">
          <span>Read</span>
          <span>Branch</span>
          <span>Commit</span>
          <span>Pull Request</span>
        </div>
      </section>

      <section class="cards" aria-label="検証項目">
        <article class="card">
          <h2>まず読む</h2>
          <p>リポジトリの状態を確認してから、必要な変更だけを加えます。</p>
        </article>
        <article class="card">
          <h2>mainを守る</h2>
          <p>初期化後の変更はブランチで行い、PRで確認できる形にします。</p>
        </article>
        <article class="card">
          <h2>小さく試す</h2>
          <p>静的HTMLから始めて、作業範囲と限界を安全に観測します。</p>
        </article>
      </section>
    </main>
  </body>
</html>
